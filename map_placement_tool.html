<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Mojiworld — Map Placement Tool</title>
<style>
  :root {
    --bg:#0c0a16; --panel:#151022; --panel-2:#1b1530;
    --fg:#e8e4f4; --muted:#9790b4; --accent:#ffdd88; --rare:#66aaff;
    --border:rgba(255,255,255,0.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
               font: 13px/1.5 -apple-system, "Segoe UI", Inter, Roboto, sans-serif; height: 100%; }
  header { padding: 12px 16px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  h1 { margin: 0; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
  h1 .accent { background: linear-gradient(90deg, #ffdd88, #ff99dd, #88ccff); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  select, button, input[type=text] {
    background: var(--panel-2); color: var(--fg); border: 1px solid var(--border);
    border-radius: 5px; padding: 5px 10px; font: inherit;
  }
  button { cursor: pointer; transition: background 0.15s; }
  button:hover { background: #2a2240; }
  button.primary { background: linear-gradient(180deg, #ffd166, #ffa040); color: #1a0e2a; border-color: #ffcc66; font-weight: 700; }
  .stage-wrap { position: relative; padding: 16px; }
  .stage {
    position: relative;
    background: linear-gradient(180deg, #0a0618 0%, #1a0f30 100%);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    user-select: none;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.45);
  }
  .stage canvas { position: absolute; inset: 0; pointer-events: none; image-rendering: -webkit-optimize-contrast; }
  .marker {
    position: absolute; width: 36px; height: 36px;
    transform: translate(-50%, -100%);     /* anchor: bottom-center */
    border-radius: 6px;
    background: rgba(40, 28, 60, 0.9);
    border: 2px solid var(--accent);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: grab; user-select: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    font-size: 18px;
    transition: box-shadow 0.15s;
  }
  .marker.npc { border-color: #88ccff; }
  .marker.prop { border-color: #ffd166; }
  .marker:hover { box-shadow: 0 0 0 2px rgba(255,255,255,0.55), 0 4px 12px rgba(0,0,0,0.6); }
  .marker:active { cursor: grabbing; }
  .marker.selected { box-shadow: 0 0 0 2px #ff99dd, 0 4px 14px rgba(0,0,0,0.7); }
  .marker .label {
    position: absolute; bottom: 100%; left: 50%; transform: translate(-50%, -2px);
    background: rgba(8, 4, 18, 0.92); padding: 2px 6px; border-radius: 3px;
    font-size: 10px; white-space: nowrap; color: #ffe6a8;
    border: 1px solid var(--border);
  }
  .stage .axis-grid {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(to right,  rgba(255,255,255,0.05) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.05) 1px, transparent 1px);
    background-size: 100px 100px;
  }
  .stage .platform {
    position: absolute; background: rgba(180, 140, 220, 0.20);
    border-top: 2px solid rgba(180, 140, 220, 0.6);
    pointer-events: none;
  }
  .stage .platform.ground {
    background: rgba(120, 90, 60, 0.30);
    border-top-color: rgba(180, 140, 80, 0.7);
  }
  .stage .ruler {
    position: absolute; top: 0; left: 0;
    color: var(--muted); font-size: 10px; pointer-events: none;
    padding: 4px 6px;
  }
  .panel {
    position: fixed; right: 16px; top: 80px; width: 360px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px; max-height: calc(100vh - 100px); overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .panel h2 { font-size: 13px; margin: 0 0 8px; letter-spacing: 0.4px; color: var(--accent); }
  .panel .row { display: flex; gap: 8px; margin-bottom: 6px; align-items: center; }
  .panel .row label { flex: 0 0 70px; color: var(--muted); font-size: 11px; }
  .panel .row input { flex: 1; }
  .panel pre { background: #0a0612; border: 1px solid var(--border); border-radius: 5px; padding: 8px; font-size: 11px; color: #d8c8ff; max-height: 240px; overflow: auto; }
  .empty { color: var(--muted); font-style: italic; padding: 6px 0; }
  .add-row { display: flex; gap: 6px; margin-top: 8px; }
  .add-row input { flex: 1; }
</style>
</head>
<body>

<header>
  <h1>Mojiworld <span class="accent">· Map Placement Tool</span></h1>
  <div class="controls">
    <label>Map:
      <select id="mapPick"></select>
    </label>
    <button id="refresh">Reload from MAPS</button>
    <button id="exportBtn" class="primary">Export prompt ↗</button>
    <button id="resetBtn">Reset</button>
  </div>
</header>

<div class="stage-wrap">
  <div class="stage" id="stage" style="width: 1100px; height: 600px;">
    <div class="axis-grid"></div>
    <div class="ruler" id="ruler">x: — &nbsp; y: —</div>
    <!-- platforms + markers injected by JS -->
  </div>
</div>

<div class="panel" id="panel">
  <h2>Selection</h2>
  <div id="selectedInfo" class="empty">Click a marker to edit. Drag any marker to move.</div>
  <h2 style="margin-top: 14px;">Add</h2>
  <div class="add-row">
    <select id="addKind">
      <option value="npc">NPC</option>
      <option value="prop">Prop</option>
    </select>
    <input id="addName" placeholder="Name / key" type="text">
    <button id="addBtn">+</button>
  </div>
  <h2 style="margin-top: 14px;">Export</h2>
  <pre id="exportOut">(click Export prompt)</pre>
</div>

<script>
// =========================================================================
// Map placement tool — drag NPCs / props on a 2D map view, export the
// resulting (x, y, anchor) per-entry list as a copy-paste prompt for
// the maple_game.html maintainer to paste back into MAPS / MAP_PROPS.
//
// Source of truth: this tool re-fetches the MAPS / MAP_PROPS objects
// from maple_game.html via a fetch() + new Function() so it always
// reflects the live map definitions. The user drags markers; on Save
// the tool serialises the new positions as a code block ready to paste
// into the MAPS[mapId].npcs and MAP_PROPS[mapId] arrays.
// =========================================================================

const STAGE = document.getElementById('stage');
const RULER = document.getElementById('ruler');
const SEL_INFO = document.getElementById('selectedInfo');
const PANEL = document.getElementById('panel');
const EXPORT_OUT = document.getElementById('exportOut');
const MAP_PICK = document.getElementById('mapPick');

// Stage scaling — the tool views maps at 50% zoom so wide maps fit on
// screen. Drag deltas reverse the zoom so output coordinates stay in
// world space.
const ZOOM = 0.5;

// In-memory edit state.
const STATE = {
  mapId: null,
  mapData: null,
  npcs: [],     // [{name, x, y, role, color, ...}]
  props: [],    // [{key, x, y, scale, anchor}]
  platforms: [],
  worldWidth: 1100,
  worldHeight: 600,
  selectedEl: null,
};

// =========================================================================
// FETCH MAPS / MAP_PROPS from maple_game.html
// =========================================================================
// Strategy: load the file as text, regex out the "const MAPS = {...}"
// and "const MAP_PROPS = {..." blocks, eval them in an isolated
// scope. Skips per-map IIFE wrappers (frozenPeak generates 200
// platforms in an IIFE) by treating them as opaque values — the
// returned object's platforms array works either way.
//
// Falls back to a hand-rolled tiny library of demo maps if fetch fails
// (file:// origin, etc.) so the tool is usable standalone.
async function loadMaps() {
  try {
    const res = await fetch('maple_game.html');
    if (!res.ok) throw new Error('fetch failed');
    const text = await res.text();
    const maps = extractMaps(text);
    const props = extractMapProps(text);
    return { maps, props };
  } catch (e) {
    console.warn('[placement-tool] fetch failed, using demo data:', e);
    return demoData();
  }
}

function extractMaps(text) {
  // Find `const MAPS = {` and walk braces to the matching `};`. The
  // file is ~45000 lines; brace-walking is the only way to capture
  // the whole declaration without false positives.
  const startIdx = text.indexOf('const MAPS = {');
  if (startIdx < 0) return null;
  const blockStart = text.indexOf('{', startIdx);
  let depth = 0, end = -1;
  for (let i = blockStart; i < text.length; i++) {
    const ch = text[i];
    if (ch === '{') depth++;
    else if (ch === '}') {
      depth--;
      if (depth === 0) { end = i + 1; break; }
    }
  }
  if (end < 0) return null;
  const blockText = text.substring(blockStart, end);
  // Eval in a sandbox: define helper stubs for any IIFE references.
  try {
    const fn = new Function(`return (${blockText});`);
    return fn();
  } catch (e) {
    console.warn('[placement-tool] MAPS eval failed:', e.message);
    return null;
  }
}

function extractMapProps(text) {
  const startIdx = text.indexOf('const MAP_PROPS = {');
  if (startIdx < 0) return null;
  const blockStart = text.indexOf('{', startIdx);
  let depth = 0, end = -1;
  for (let i = blockStart; i < text.length; i++) {
    const ch = text[i];
    if (ch === '{') depth++;
    else if (ch === '}') {
      depth--;
      if (depth === 0) { end = i + 1; break; }
    }
  }
  if (end < 0) return null;
  const blockText = text.substring(blockStart, end);
  try {
    const fn = new Function(`return (${blockText});`);
    return fn();
  } catch (e) {
    console.warn('[placement-tool] MAP_PROPS eval failed:', e.message);
    return null;
  }
}

function demoData() {
  // Tiny demo data so the tool loads even when fetch fails.
  return {
    maps: {
      town: {
        name: 'Everdawn Central (demo)',
        worldWidth: 1100,
        platforms: [
          { x: 0, y: 480, w: 1100, h: 60, type: 'ground' },
          { x: 120, y: 360, w: 80, h: 10, type: 'platform' },
          { x: 540, y: 360, w: 80, h: 10, type: 'platform' },
          { x: 820, y: 360, w: 80, h: 10, type: 'platform' },
        ],
        npcs: [
          { name: 'The Amnesiac', x: 440, role: 'amnesiac', color: '#cc9944' },
          { name: '???',          x: 600, role: 'sage',     color: '#aa66cc' },
          { name: 'Taxi Uncle',   x: 860, role: 'caravan',  color: '#e8b85a' },
        ],
      },
    },
    props: {
      town: [
        { key: 'well_stone', x: 200, y: 480, scale: 1.0 },
        { key: 'signpost_wood', x: 560, y: 480, scale: 1.0 },
      ],
    },
  };
}

// =========================================================================
// RENDER
// =========================================================================
function loadMap(mapId, maps, props) {
  const m = maps[mapId];
  if (!m) return;
  STATE.mapId = mapId;
  STATE.mapData = m;
  STATE.worldWidth  = m.worldWidth  || 1100;
  STATE.worldHeight = m.worldHeight || 600;
  STATE.platforms   = (m.platforms || []).slice();
  // Deep-copy NPCs + props so edits stay local until export.
  STATE.npcs  = (m.npcs || []).map(n => ({
    name: n.name, x: n.x, y: typeof n.y === 'number' ? n.y : 436,
    role: n.role || '', color: n.color || '',
  }));
  STATE.props = ((props && props[mapId]) || []).map(p => ({
    key: p.key, x: p.x, y: p.y, scale: p.scale || 1, anchor: p.anchor || 'feet',
  }));
  renderStage();
}

function renderStage() {
  // Resize stage to fit map at ZOOM
  const sw = STATE.worldWidth * ZOOM;
  const sh = STATE.worldHeight * ZOOM;
  STAGE.style.width = sw + 'px';
  STAGE.style.height = sh + 'px';
  // Clear (keep axis-grid + ruler children; remove platforms / markers)
  Array.from(STAGE.children).forEach(c => {
    if (!c.classList.contains('axis-grid') && !c.classList.contains('ruler')) STAGE.removeChild(c);
  });
  // Platforms
  for (const p of STATE.platforms) {
    const el = document.createElement('div');
    el.className = 'platform' + (p.type === 'ground' ? ' ground' : '');
    el.style.left   = (p.x * ZOOM) + 'px';
    el.style.top    = (p.y * ZOOM) + 'px';
    el.style.width  = ((p.w || 80) * ZOOM) + 'px';
    el.style.height = ((p.h || 10) * ZOOM) + 'px';
    if (p.tag) el.title = 'tag: ' + p.tag;
    STAGE.appendChild(el);
  }
  // NPC markers
  for (const npc of STATE.npcs) addMarker('npc', npc, '🧑');
  // Prop markers
  for (const prop of STATE.props) {
    const icon = propIcon(prop.key);
    addMarker('prop', prop, icon);
  }
}

function propIcon(key) {
  if (!key) return '📦';
  if (/banner|flag|pennant/.test(key))         return '🚩';
  if (/anvil|brazier|forge/.test(key))         return '🛠';
  if (/throne|chair|seat/.test(key))           return '🪑';
  if (/lantern|candle/.test(key))              return '🏮';
  if (/well|fountain/.test(key))               return '⛲';
  if (/wagon|cart/.test(key))                  return '🛒';
  if (/crate|barrel|stack/.test(key))          return '📦';
  if (/lion|statue|mirror/.test(key))          return '🗿';
  if (/herb|pot|flower/.test(key))             return '🌿';
  if (/cherry|tree|branch/.test(key))          return '🌸';
  if (/koi|pond/.test(key))                    return '🐟';
  if (/target|archery|bell/.test(key))         return '🎯';
  if (/tatami|incense|shuriken|skull/.test(key)) return '🥷';
  if (/stall|signpost|fence/.test(key))        return '🛍';
  if (/desk|hearth|prayer/.test(key))          return '📚';
  return '📦';
}

function addMarker(kind, entry, icon) {
  const el = document.createElement('div');
  el.className = 'marker ' + kind;
  el.style.left = (entry.x * ZOOM) + 'px';
  el.style.top  = ((entry.y || 480) * ZOOM) + 'px';
  el.textContent = icon || (kind === 'npc' ? '🧑' : '📦');
  // Label
  const label = document.createElement('span');
  label.className = 'label';
  label.textContent = (kind === 'npc' ? entry.name : entry.key) + ' · ' + (entry.x | 0) + ',' + ((entry.y || 0) | 0);
  el.appendChild(label);
  // Drag handlers
  el._entry = entry;
  el._kind = kind;
  attachDrag(el);
  el.onclick = (ev) => {
    ev.stopPropagation();
    selectMarker(el);
  };
  STAGE.appendChild(el);
}

function attachDrag(el) {
  let dragging = false, startX = 0, startY = 0, origX = 0, origY = 0;
  el.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    origX = el._entry.x;
    origY = el._entry.y || 480;
    el.classList.add('dragging');
  });
  el.addEventListener('pointermove', (e) => {
    if (!dragging) return;
    const dx = (e.clientX - startX) / ZOOM;
    const dy = (e.clientY - startY) / ZOOM;
    const newX = Math.max(0, Math.min(STATE.worldWidth, Math.round(origX + dx)));
    const newY = Math.max(0, Math.min(STATE.worldHeight, Math.round(origY + dy)));
    el._entry.x = newX;
    el._entry.y = newY;
    el.style.left = (newX * ZOOM) + 'px';
    el.style.top  = (newY * ZOOM) + 'px';
    const lbl = el.querySelector('.label');
    if (lbl) lbl.textContent = (el._kind === 'npc' ? el._entry.name : el._entry.key) + ' · ' + newX + ',' + newY;
    selectMarker(el);
  });
  el.addEventListener('pointerup', () => { dragging = false; el.classList.remove('dragging'); });
  el.addEventListener('pointercancel', () => { dragging = false; el.classList.remove('dragging'); });
  // Track stage-relative cursor for the ruler
  el.addEventListener('pointermove', updateRuler);
}

function updateRuler(e) {
  const r = STAGE.getBoundingClientRect();
  const x = Math.round((e.clientX - r.left) / ZOOM);
  const y = Math.round((e.clientY - r.top) / ZOOM);
  RULER.textContent = `x: ${x}  y: ${y}`;
}
STAGE.addEventListener('pointermove', updateRuler);
STAGE.addEventListener('click', () => {
  if (STATE.selectedEl) STATE.selectedEl.classList.remove('selected');
  STATE.selectedEl = null;
  SEL_INFO.className = 'empty';
  SEL_INFO.textContent = 'Click a marker to edit. Drag any marker to move.';
});

function selectMarker(el) {
  if (STATE.selectedEl) STATE.selectedEl.classList.remove('selected');
  STATE.selectedEl = el;
  el.classList.add('selected');
  const e = el._entry;
  const isNpc = el._kind === 'npc';
  SEL_INFO.className = '';
  SEL_INFO.innerHTML = `
    <div class="row"><label>Kind</label><b>${isNpc ? 'NPC' : 'Prop'}</b></div>
    <div class="row"><label>${isNpc ? 'Name' : 'Key'}</label><input id="selName" type="text" value="${(isNpc ? e.name : e.key).replace(/"/g, '&quot;')}"></div>
    <div class="row"><label>x</label><input id="selX" type="text" value="${e.x | 0}"></div>
    <div class="row"><label>y</label><input id="selY" type="text" value="${(e.y || 0) | 0}"></div>
    ${isNpc ? '' : `<div class="row"><label>scale</label><input id="selScale" type="text" value="${e.scale}"></div>
                    <div class="row"><label>anchor</label><input id="selAnchor" type="text" value="${e.anchor || 'feet'}"></div>`}
    <div class="row" style="justify-content: flex-end;"><button id="delBtn">Delete</button></div>
  `;
  document.getElementById('selName').oninput = (ev) => {
    const v = ev.target.value;
    if (isNpc) e.name = v; else e.key = v;
    const lbl = el.querySelector('.label');
    if (lbl) lbl.textContent = v + ' · ' + e.x + ',' + e.y;
  };
  document.getElementById('selX').oninput = (ev) => {
    const v = parseInt(ev.target.value, 10) || 0;
    e.x = v;
    el.style.left = (v * ZOOM) + 'px';
    const lbl = el.querySelector('.label');
    if (lbl) lbl.textContent = (isNpc ? e.name : e.key) + ' · ' + v + ',' + e.y;
  };
  document.getElementById('selY').oninput = (ev) => {
    const v = parseInt(ev.target.value, 10) || 0;
    e.y = v;
    el.style.top = (v * ZOOM) + 'px';
    const lbl = el.querySelector('.label');
    if (lbl) lbl.textContent = (isNpc ? e.name : e.key) + ' · ' + e.x + ',' + v;
  };
  if (!isNpc) {
    document.getElementById('selScale').oninput  = (ev) => { e.scale = parseFloat(ev.target.value) || 1; };
    document.getElementById('selAnchor').oninput = (ev) => { e.anchor = (ev.target.value || 'feet').trim(); };
  }
  document.getElementById('delBtn').onclick = () => {
    const list = isNpc ? STATE.npcs : STATE.props;
    const idx = list.indexOf(e);
    if (idx >= 0) list.splice(idx, 1);
    el.remove();
    SEL_INFO.className = 'empty';
    SEL_INFO.textContent = 'Deleted. Click a marker or drag to edit.';
  };
}

// =========================================================================
// EXPORT
// =========================================================================
function exportPrompt() {
  if (!STATE.mapId) return '(no map loaded)';
  const lines = [];
  lines.push(`# Placement update for ${STATE.mapId}`);
  lines.push('');
  lines.push(`Please reposition the NPCs and world props for the **${STATE.mapId}** map to match the coordinates below. Open \`maple_game.html\`, find the matching MAPS / MAP_PROPS entry, and update the \`x\` / \`y\` fields exactly as listed.`);
  lines.push('');
  if (STATE.npcs.length) {
    lines.push('## MAPS.' + STATE.mapId + '.npcs');
    lines.push('```js');
    for (const n of STATE.npcs) {
      const yField = (typeof n.y === 'number' && n.y !== 436) ? `, y:${n.y}` : '';
      const role = n.role ? `, role:'${n.role}'` : '';
      const color = n.color ? `, color:'${n.color}'` : '';
      lines.push(`  { x:${n.x|0}${yField}, name:'${n.name}'${role}${color} },`);
    }
    lines.push('```');
    lines.push('');
  }
  if (STATE.props.length) {
    lines.push('## MAP_PROPS.' + STATE.mapId);
    lines.push('```js');
    for (const p of STATE.props) {
      const anc = (p.anchor && p.anchor !== 'feet') ? `, anchor:'${p.anchor}'` : '';
      lines.push(`  { key:'${p.key}', x:${p.x|0}, y:${p.y|0}, scale:${p.scale}${anc} },`);
    }
    lines.push('```');
  }
  return lines.join('\n');
}

// =========================================================================
// WIRE-UP
// =========================================================================
let _maps = null, _props = null;

async function init() {
  const data = await loadMaps();
  _maps = data.maps || {};
  _props = data.props || {};
  // Populate map picker
  MAP_PICK.innerHTML = '';
  const ids = Object.keys(_maps).sort();
  for (const id of ids) {
    const opt = document.createElement('option');
    opt.value = id;
    const m = _maps[id];
    opt.textContent = id + (m && m.name ? ` — ${m.name}` : '');
    MAP_PICK.appendChild(opt);
  }
  if (ids.length) loadMap(ids[0], _maps, _props);
}

MAP_PICK.onchange = () => { loadMap(MAP_PICK.value, _maps, _props); };
document.getElementById('refresh').onclick = init;
document.getElementById('exportBtn').onclick = () => {
  EXPORT_OUT.textContent = exportPrompt();
  EXPORT_OUT.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
};
document.getElementById('resetBtn').onclick = () => {
  if (STATE.mapId) loadMap(STATE.mapId, _maps, _props);
};
document.getElementById('addBtn').onclick = () => {
  const kind = document.getElementById('addKind').value;
  const name = document.getElementById('addName').value.trim();
  if (!name) return;
  if (kind === 'npc') {
    const e = { name, x: 200, y: 436, role: '', color: '' };
    STATE.npcs.push(e);
    addMarker('npc', e, '🧑');
  } else {
    const e = { key: name, x: 200, y: 480, scale: 1, anchor: 'feet' };
    STATE.props.push(e);
    addMarker('prop', e, propIcon(name));
  }
  document.getElementById('addName').value = '';
};

init();
</script>
</body>
</html>
