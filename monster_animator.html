<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LevelX — Monster Animator / Calibration</title>
<style>
  :root { --bg:#0d1018; --panel:#161b27; --panel2:#1d2434; --line:#2a3346; --txt:#dfe6f2; --mut:#8a97ad; --acc:#5b8cff; --idle:#4cc9f0; --walk:#ffd166; --attack:#ef476f; }
  * { box-sizing:border-box; }
  body { margin:0; font:13px/1.45 system-ui,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--txt); height:100vh; display:flex; overflow:hidden; }
  h1 { font-size:14px; margin:0; letter-spacing:.3px; }
  .mut { color:var(--mut); }
  a { color:var(--acc); }
  /* ---- left: entity list ---- */
  #side { width:230px; flex:0 0 230px; background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; }
  #side header { padding:10px 12px; border-bottom:1px solid var(--line); }
  #q { width:100%; margin-top:8px; background:var(--panel2); border:1px solid var(--line); color:var(--txt); border-radius:7px; padding:6px 9px; font-size:12px; }
  #list { overflow:auto; flex:1; padding:6px; }
  .row { padding:7px 9px; border-radius:7px; cursor:pointer; display:flex; align-items:center; gap:7px; }
  .row:hover { background:var(--panel2); }
  .row.sel { background:#26314a; outline:1px solid var(--acc); }
  .row .nm { font-size:12px; }
  .tag { font-size:9px; padding:1px 5px; border-radius:6px; text-transform:uppercase; letter-spacing:.4px; }
  .tag.boss { background:#3a2030; color:#ffb3c8; }
  .tag.monster { background:#1f2f24; color:#9fe0b0; }
  .dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
  /* ---- center: stage ---- */
  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #bar { display:flex; align-items:center; gap:10px; padding:9px 14px; border-bottom:1px solid var(--line); background:var(--panel); }
  #bar .grow { flex:1; }
  button { background:var(--panel2); border:1px solid var(--line); color:var(--txt); border-radius:7px; padding:6px 11px; cursor:pointer; font-size:12px; }
  button:hover { border-color:var(--acc); }
  button.primary { background:var(--acc); border-color:var(--acc); color:#fff; font-weight:600; }
  button.warn { color:#ffb3c8; }
  #stagewrap { flex:1; overflow:auto; background:radial-gradient(120% 120% at 50% 0,#11151f,#0a0d14); position:relative; }
  #stage { display:block; margin:0 auto; }
  #hint { position:absolute; left:12px; bottom:10px; font-size:11px; color:var(--mut); pointer-events:none; }
  .legend { display:flex; gap:14px; font-size:11px; }
  .legend span { display:flex; align-items:center; gap:5px; }
  /* ---- right: controls ---- */
  #ctrl { width:300px; flex:0 0 300px; background:var(--panel); border-left:1px solid var(--line); overflow:auto; padding:12px; }
  #ctrl .who { font-size:13px; font-weight:600; margin-bottom:2px; word-break:break-all; }
  .scard { background:var(--panel2); border:1px solid var(--line); border-radius:10px; padding:11px; margin-bottom:11px; }
  .scard h3 { margin:0 0 8px; font-size:12px; display:flex; align-items:center; gap:7px; }
  .sl { display:grid; grid-template-columns:26px 1fr 58px; gap:8px; align-items:center; margin:7px 0; }
  .sl label { font-size:11px; color:var(--mut); }
  .sl input[type=range] { width:100%; }
  .sl input[type=number] { width:100%; background:var(--bg); border:1px solid var(--line); color:var(--txt); border-radius:6px; padding:3px 5px; font-size:11px; }
  .srow { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .reset { font-size:10px; padding:3px 7px; }
  .empty { padding:40px 16px; text-align:center; color:var(--mut); }
  code { background:#0a0d14; padding:1px 5px; border-radius:5px; font-size:11px; }
  #toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#1c2740; border:1px solid var(--acc); color:#fff; padding:9px 16px; border-radius:9px; font-size:12px; opacity:0; transition:opacity .2s; pointer-events:none; }
  #toast.show { opacity:1; }
</style>
</head>
<body>
  <aside id="side">
    <header>
      <h1>Monster Animator</h1>
      <div class="mut" style="font-size:11px;margin-top:3px">scale &amp; reposition idle / walk / attack</div>
      <input id="q" placeholder="search… (e.g. wolf, gravitos)" />
    </header>
    <div id="list"></div>
  </aside>

  <main id="main">
    <div id="bar">
      <div class="legend">
        <span><i class="dot" style="background:var(--idle)"></i>idle</span>
        <span><i class="dot" style="background:var(--walk)"></i>walk</span>
        <span><i class="dot" style="background:var(--attack)"></i>attack</span>
      </div>
      <label class="mut" style="font-size:11px;display:flex;align-items:center;gap:5px">
        overlay<input type="checkbox" id="overlay" />
      </label>
      <label class="mut" style="font-size:11px;display:flex;align-items:center;gap:5px" title="Draw the gameplay hitbox (monsterTypes w×h, foot-anchored) under each sprite">
        hitbox<input type="checkbox" id="hitbox" />
      </label>
      <label class="mut" style="font-size:11px;display:flex;align-items:center;gap:5px" title="Edit the per-state ATTACK hitbox (the region player attacks can hit). Drag the box to move, drag the corner handle to resize.">
        edit hitbox<input type="checkbox" id="hbedit" />
      </label>
      <label class="mut" style="font-size:11px;display:flex;align-items:center;gap:5px">
        fps<input type="range" id="fps" min="3" max="18" value="8" style="width:80px" /><span id="fpsv">8</span>
      </label>
      <div class="grow"></div>
      <button id="undo" title="Undo last change (Ctrl+Z)">&#8630; Undo</button>
      <button id="save" class="primary">Save (live)</button>
      <button id="download">Download anim_calib.js</button>
    </div>
    <div id="stagewrap">
      <canvas id="stage" width="900" height="520"></canvas>
      <div id="hint">Drag a sprite in the stage to nudge its X/Y · scroll-wheel over a sprite to scale</div>
    </div>
  </main>

  <aside id="ctrl">
    <div class="empty" id="ctrlEmpty">Pick a monster or boss on the left to begin.</div>
    <div id="ctrlBody" style="display:none"></div>
  </aside>

  <div id="toast"></div>

  <script src="anim_calib.js"></script>
  <script src="anim_calib_manifest.js"></script>
  <script src="mob_offsets.js"></script>
  <script src="monster_hitboxes.js"></script>
  <script src="monster_animator_app.js"></script>
  <script src="monster_animator_ui.js"></script>
</body>
</html>
