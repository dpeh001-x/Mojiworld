<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zodiac Boss Animation Preview</title>
<style>
  body { margin:0; background:#0f1020; color:#e6e0ff; font:14px/1.5 system-ui, sans-serif; padding:24px; }
  h1 { font-size:18px; color:#cdbcff; margin:0 0 4px; }
  p.note { color:#8f88b5; margin:0 0 20px; }
  .controls { margin:0 0 24px; }
  .controls label { margin-right:16px; }
  .row { display:flex; flex-wrap:wrap; gap:24px; margin-bottom:26px; align-items:flex-end; }
  .cell { text-align:center; }
  .cell img, .cell canvas { width:200px; height:200px; object-fit:contain;
    background:repeating-conic-gradient(#1b1733 0 25%, #14112a 0 50%) 50%/24px 24px; border-radius:12px; border:1px solid #322a52; }
  .cell .lbl { margin-top:7px; font-weight:600; } .cell .sub { color:#8f88b5; font-size:12px; }
  .anim { border-color:#a48cf0 !important; box-shadow:0 0 16px rgba(164,140,240,0.3); }
  .sign-title { font-size:16px; color:#ffd479; margin:24px 0 10px; border-bottom:1px solid #322a52; padding-bottom:6px; text-transform:capitalize; }
</style>
</head>
<body>
  <h1>Zodiac Boss Animation Preview</h1>
  <p class="note">9-frame attack + idle, authored at exact base dimensions (True-Size, no reframe/warp). Base portrait shown for comparison.</p>
  <div class="controls">
    <label>Attack hold (ms): <input id="ms" type="range" min="40" max="160" value="70"> <span id="msv">70</span></label>
    <label><input id="pp" type="checkbox" checked> ping-pong</label>
  </div>
  <div id="root"></div>
<script>
const SIGNS = ['aries','taurus','gemini','cancer','leo','virgo','libra','scorpio','sagittarius','capricorn','aquarius','pisces'];
const root = document.getElementById('root');
const msEl = document.getElementById('ms'), msv = document.getElementById('msv'), ppEl = document.getElementById('pp');
const anims = [];
function seqFor(n, pp) { if (n < 2) return [0]; if (!pp) return Array.from({length:n},(_,i)=>i); const s=[]; for(let i=0;i<n;i++)s.push(i); for(let i=n-2;i>=1;i--)s.push(i); return s; }

for (const sign of SIGNS) {
  const title = document.createElement('div'); title.className = 'sign-title'; title.textContent = sign; root.appendChild(title);
  const row = document.createElement('div'); row.className = 'row';
  // base portrait
  const bd = document.createElement('div'); bd.className = 'cell';
  const bi = document.createElement('img'); bi.src = `../Sprites/bosses/zodiac/${sign}.png`; bd.appendChild(bi);
  bd.insertAdjacentHTML('beforeend', `<div class="lbl">base</div><div class="sub">${sign}.png</div>`);
  row.appendChild(bd);
  // idle + attack animated cells
  const mk = (label, dir, fixedMs, straight) => {
    const c = document.createElement('canvas'); c.width = 200; c.height = 200; c.className = 'anim';
    const cw = document.createElement('div'); cw.className = 'cell'; cw.appendChild(c);
    cw.insertAdjacentHTML('beforeend', `<div class="lbl">▶ ${label}</div><div class="sub">${dir}/${sign}_0..8</div>`);
    row.appendChild(cw);
    const frames = Array.from({length:9}, (_,i) => { const im = new Image(); im.src = `../Sprites/bosses/zodiac/${dir}/${sign}_${i}.webp`; return im; });
    anims.push({ ctx: c.getContext('2d'), frames, fixedMs, straight });
  };
  mk('idle loop', 'idle', 130);
  mk('walk loop', 'walk', 80, true);   // straight loop (matches game)
  mk('attack loop', 'attack', null, true);
  root.appendChild(row);
}

function tick(t) {
  const ms = Number(msEl.value); msv.textContent = ms;
  for (const a of anims) {
    let n = 0; while (n < a.frames.length && a.frames[n].complete && a.frames[n].naturalWidth) n++;
    const seq = a.straight ? Array.from({length:Math.max(1,n)},(_,i)=>i) : seqFor(n, ppEl.checked);
    const f = a.frames[seq[Math.floor(t / (a.fixedMs || ms)) % seq.length]];
    a.ctx.clearRect(0, 0, 200, 200);
    if (f && f.complete && f.naturalWidth) {
      const s = Math.min(200 / f.naturalWidth, 200 / f.naturalHeight);
      const w = f.naturalWidth * s, h = f.naturalHeight * s;
      a.ctx.drawImage(f, (200 - w) / 2, 200 - h, w, h);
    }
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
</body>
</html>
